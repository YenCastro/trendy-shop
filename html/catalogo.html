<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendyShop | Catalogo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/catalogo.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <main class="catalogo-contenedor container-xl">
        <section class="catalogo-encabezado">
            <span class="catalogo-encabezado__etiqueta">Filtrar por categoria</span>
            <h1>Productos</h1>
            <p>Explora una selección de hasta 25 productos, mostrados en páginas de 10 elementos.</p>
        <button class="icon-button icon-button--label btn-filtro" type="button" data-filtro="todos">
  Todos
</button>

<button class="icon-button icon-button--label btn-filtro" type="button" data-filtro="ropa-hombre">
  Ropa hombre
</button>

<button class="icon-button icon-button--label btn-filtro" type="button" data-filtro="ropa-mujer">
  Ropa mujer
</button>

<button class="icon-button icon-button--label btn-filtro" type="button" data-filtro="zapatos-hombre">
  Zapatos hombre
</button>

<button class="icon-button icon-button--label btn-filtro" type="button" data-filtro="zapatos-mujer">
  Zapatos mujer
</button>

<button class="icon-button icon-button--label btn-filtro" type="button" data-filtro="accesorios">
  Accesorios
</button>
</section>

        <section class="catalogo-productos">
            <div id="catalogoEstado" class="catalogo-estado">Cargando productos...</div>
            <div id="contenedor-productos" class="pricing-lab"></div>

            <div class="catalogo-paginacion">
                <button id="paginaAnterior" type="button" class="secondary-button">Anterior</button>
                <span id="paginaActual" class="catalogo-paginacion__estado">Pagina 1</span>
                <button id="paginaSiguiente" type="button" class="primary-button">Siguiente</button>
            </div>
        </section>
    </main>

    <script type="module" src="../js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
