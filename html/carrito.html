<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendyShop | Carrito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/carrito.css">
</head>

<body>
 <main class="container my-5">
    <h2 class="mb-4 fw-bold text-center" style="color: var(--nav-primary); font-family: var(--font-heading);">
        Tu Carrito de Compras
    </h2>
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card p-4 shadow-sm border-0" style="background: var(--nav-bg); border-radius: 18px;">
                <div class="table-responsive">
                    <table class="table table-cart align-middle" style="color: var(--nav-text); font-family: var(--font-primary); table-layout: fixed; width: 100%;">
                      <thead class="table-header">
                        <tr>
                            <th style="width: 25%;">Producto</th>
                            <th style="width: 15%;">Precio</th>
                            <th style="width: 15%;" class="text-center">Cantidad</th>
                            <th style="width: 15%;">Subtotal</th>
                            <th style="width: 15%;" class="text-center">Acción</th>
                        </tr>
                        </thead>
                        <tbody id="contenedor-carrito">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card p-4 shadow-sm border-0" style="background:var(--nav-bg); border: 1px solid rgba(209, 122, 91, 0.22) !important;">
                <h4 class="fw-bold m-3" style="font-family: var(--font-heading); color: var(--nav-text);">Resumen del Pedido</h4>
                <hr style="color: var(--nav-primary);">

                <div class="d-flex justify-content-between mb-4 fs-5 fw-bold" style="color: var(--nav-text); font-family: var(--font-primary);">
                    <span>Total:</span>            
                    <span id="total-compra" style="color: var(--nav-primary);">$0.00</span>
                </div>
                <button id="btn-vaciar" class="btn btn-outline-secondary w-100 mb-2 fw-medium" style="border-radius: 999px;">
                    Vaciar Carrito
                </button>
                <button id="btn-comprar" class="btn w-100 fw-bold text-white" style="background: var(--nav-primary); border-radius: 999px; box-shadow: 0 8px 16px rgba(209, 122, 91, 0.15);">
                    Proceder al Pago 
                </button>
            </div>
        </div>
    </div>
 </main>
    
    <div class="overlay" id="overlay"></div>

    <div id="toastContainer"></div>
    <script type="module" src="../js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
